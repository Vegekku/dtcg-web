<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Rarity Badge — Test completo</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      padding: 24px;
      background: #f0f0f0;
    }

    h2 {
      width: 100%;
      margin: 12px 0 4px;
      font-size: 0.9rem;
      color: #333;
    }

    .item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      font-size: 0.65rem;
      color: #444;
      width: 60px;
      text-align: center;
    }

    /* Simular el contexto de la tabla */
    table.set { display: inline-table; }
    .item tr {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 28px;
      border-radius: 4px;
    }
    .item td.card_info {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 28px;
    }
  </style>
  <script src="js/utils.js"></script>
</head>
<body>
<script>
  const rarezas = ['c','u','r','sr','ur','sec','p','sp','aa','t','?'];
  const colores = [
    'red','blue','yellow','green','black','purple','white',
    'red-blue','red-yellow','red-green','red-black','red-purple','red-white',
    'blue-yellow','blue-green','blue-black','blue-purple','blue-white',
    'yellow-red','yellow-blue','yellow-green','yellow-black','yellow-purple','yellow-white',
    'green-red','green-blue','green-yellow','green-black','green-purple','green-white',
    'black-red','black-blue','black-yellow','black-green','black-purple','black-white',
    'purple-red','purple-blue','purple-yellow','purple-green','purple-black','purple-white',
    'red-blue-green','red-blue-black','red-blue-purple','red-blue-white','blue-white-red',
    'red-yellow-green','red-yellow-black','red-purple-black','black-yellow-purple'
  ];

  rarezas.forEach(r => {
    const h2 = document.createElement('h2');
    h2.textContent = `Rareza: ${r.toUpperCase()}`;
    document.body.appendChild(h2);

    colores.forEach(color => {
      const item = document.createElement('div');
      item.className = 'item';
      item.innerHTML = `
        <table class="set">
          <tbody>
            <tr data-color="${color}">
              <td class="card_info">
                <div class="card_info__rarity">${rarityBadge(r, color)}</div>
              </td>
            </tr>
          </tbody>
        </table>
        <span>${color}</span>
      `;
      document.body.appendChild(item);
    });
  });
</script>
</body>
</html>
